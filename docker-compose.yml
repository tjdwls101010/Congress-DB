services:
  db:
    image: postgres:16-alpine
    container_name: congress-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-congress}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-congress_dev}
      POSTGRES_DB: ${POSTGRES_DB:-congress}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - congress-db-data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - max_wal_size=4GB
      - -c
      - checkpoint_timeout=15min
      - -c
      - checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-congress} -d ${POSTGRES_DB:-congress}"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  congress-db-data:
